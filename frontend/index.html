<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 To-Do List</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: 'Courier New', Courier, monospace; 
            color: #111; 
            padding: 20px; 
        }
        .container { max-width: 600px; margin: 40px auto; }
        .title { 
            font-size: 3rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            border-bottom: 6px solid #111; 
            padding-bottom: 10px; 
        }
        .card { 
            background-color: #fff; 
            border: 4px solid #111; 
            box-shadow: 8px 8px 0px #111; 
            padding: 25px; 
            margin-bottom: 25px; 
        }
        .brutal-input { 
            width: 100%; 
            border: 4px solid #111; 
            padding: 15px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            outline: none; 
        }
        .brutal-input:focus { background-color: #e2fcc3; }
        .brutal-btn { 
            background-color: #ff3b30; 
            color: white; 
            border: 4px solid #111; 
            padding: 15px 25px; 
            font-size: 1.2rem; 
            font-weight: 900; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #111; 
            transition: 0.1s; 
            text-transform: uppercase;
        }
        .brutal-btn:hover { 
            transform: translate(4px, 4px); 
            box-shadow: 0px 0px 0px #111; 
        }
        .connect-btn { background-color: #007aff; width: 100%; margin-bottom: 30px; }
        .hidden { display: none !important; }
        .task-item { border-bottom: 2px solid #111; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Web3 To-Do List</h1>

        <button id="connectBtn" class="brutal-btn connect-btn">Koneksikan Wallet (Freighter)</button>
        
        <div id="walletInfo" class="card hidden">
            <p style="margin: 0; font-weight: bold;">Wallet Terhubung: <span id="walletAddress"></span></p>
        </div>

        <form id="todoForm" class="card hidden">
            <input type="text" id="taskTitle" class="brutal-input" placeholder="Judul Tugas..." required>
            <input type="text" id="taskContent" class="brutal-input" placeholder="Detail Tugas..." required>
            <button type="submit" class="brutal-btn">Simpan ke Blockchain</button>
        </form>

        <div class="card">
            <h2 style="margin-top: 0; border-bottom: 3px solid #111; padding-bottom: 10px;">Daftar Tugas</h2>
            <div id="taskList">
                <p style="font-weight: bold; color: #666;">Silakan hubungkan wallet untuk melihat data.</p>
            </div>
        </div>
    </div>

    <script type="module">
        // Mengunci modul ke versi 1.5.0 secara spesifik
        import { isAllowed, setAllowed, getUserInfo } from 'https://cdn.jsdelivr.net/npm/@stellar/freighter-api@1.5.0/+esm';
        
        // Ganti dengan Contract ID yang didapat dari terminal!
        const CONTRACT_ID = "CB7HQHDN4O7P5DMJPKGQ5GO7SZXS7XMIF4C73TUL36S7UDN6KHEODO2D"; 

        const connectBtn = document.getElementById('connectBtn');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddressSpan = document.getElementById('walletAddress');
        const todoForm = document.getElementById('todoForm');
        const taskTitle = document.getElementById('taskTitle');
        const taskContent = document.getElementById('taskContent');
        const taskList = document.getElementById('taskList');

        async function checkConnection() {
            try {
                // Mengecek apakah sudah punya izin
                if (await isAllowed()) {
                    const userInfo = await getUserInfo();
                    if (userInfo && userInfo.publicKey) {
                        const pk = userInfo.publicKey;
                        walletAddressSpan.innerText = pk.slice(0, 6) + '...' + pk.slice(-6);
                        
                        connectBtn.classList.add('hidden');
                        walletInfo.classList.remove('hidden');
                        todoForm.classList.remove('hidden');
                        taskList.innerHTML = `<p>Mengambil data dari blockchain...</p>`;
                    }
                }
            } catch (error) {
                console.error("Belum terhubung:", error);
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                // Meminta izin ke ekstensi Freighter
                await setAllowed(); 
                await checkConnection();
            } catch (error) {
                console.error("Proses koneksi dibatalkan user:", error);
            }
        });

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Memproses Transaksi...";
            btn.style.backgroundColor = "#ffcc00";
            
            console.log(`Menambahkan tugas ke Contract: ${CONTRACT_ID}`);
            console.log("Judul:", taskTitle.value);
            console.log("Isi:", taskContent.value);
            
            setTimeout(() => {
                alert("Simulasi berhasil: Tugas ditambahkan ke blockchain!");
                taskTitle.value = '';
                taskContent.value = '';
                btn.innerText = "Simpan ke Blockchain";
                btn.style.backgroundColor = "#ff3b30";
            }, 1500);
        });

        // Cek koneksi saat file dibuka
        checkConnection();
    </script>
</body>
</html>
