<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 To-Do List</title>
    <link rel="icon" href="data:,">
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: 'Courier New', Courier, monospace; 
            color: #111; 
            padding: 20px; 
        }
        .container { max-width: 600px; margin: 40px auto; }
        .title { 
            font-size: 3rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            border-bottom: 6px solid #111; 
            padding-bottom: 10px; 
        }
        .card { 
            background-color: #fff; 
            border: 4px solid #111; 
            box-shadow: 8px 8px 0px #111; 
            padding: 25px; 
            margin-bottom: 25px; 
        }
        .brutal-input { 
            width: 100%; 
            border: 4px solid #111; 
            padding: 15px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            outline: none; 
        }
        .brutal-input:focus { background-color: #e2fcc3; }
        .brutal-btn { 
            background-color: #007aff; 
            color: white; 
            border: 4px solid #111; 
            padding: 15px 25px; 
            font-size: 1.2rem; 
            font-weight: 900; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #111; 
            transition: 0.1s; 
            text-transform: uppercase;
        }
        .brutal-btn:hover { 
            transform: translate(4px, 4px); 
            box-shadow: 0px 0px 0px #111; 
        }
        .brutal-btn.small {
            padding: 8px 15px;
            font-size: 0.9rem;
            background-color: #ff3b30;
            box-shadow: 3px 3px 0px #111;
        }
        .brutal-btn.small:hover {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #111;
        }
        .connect-btn { background-color: #111; width: 100%; margin-bottom: 30px; }
        .hidden { display: none !important; }
        .task-item { 
            border-bottom: 3px solid #111; 
            padding: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .task-item:last-child { border-bottom: none; padding-bottom: 0; }
        .wallet-header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Web3 To-Do List</h1>

        <button id="connectBtn" class="brutal-btn connect-btn">Connect Wallet</button>
        
        <div id="walletInfo" class="card hidden">
            <div class="wallet-header">
                <p style="margin: 0; font-weight: bold;">Wallet: <span id="walletAddress"></span></p>
                <button id="disconnectBtn" class="brutal-btn small" style="background-color: #111;">Change Wallet</button>
            </div>
        </div>

        <form id="todoForm" class="card hidden">
            <input type="text" id="taskTitle" class="brutal-input" placeholder="Task Title..." required>
            <input type="text" id="taskContent" class="brutal-input" placeholder="Task Details..." required>
            <button type="submit" class="brutal-btn" style="background-color: #34c759;">Save to Blockchain</button>
        </form>

        <div class="card">
            <h2 style="margin-top: 0; border-bottom: 3px solid #111; padding-bottom: 10px;">Task List</h2>
            <div id="taskList">
                <p style="font-weight: bold; color: #666;">Please connect your wallet to view data.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { isAllowed, setAllowed, getUserInfo } from 'https://cdn.jsdelivr.net/npm/@stellar/freighter-api@1.5.0/+esm';
        
        // Contract ID sudah diperbarui
        const CONTRACT_ID = "CB7HQHDN4O7P5DMJPKGQ5GO7SZXS7XMIF4C73TUL36S7UDN6KHEODO2D"; 

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddressSpan = document.getElementById('walletAddress');
        const todoForm = document.getElementById('todoForm');
        const taskTitle = document.getElementById('taskTitle');
        const taskContent = document.getElementById('taskContent');
        const taskList = document.getElementById('taskList');

        let tasks = JSON.parse(localStorage.getItem('stellar_tasks')) || [];

        function saveTasks() {
            localStorage.setItem('stellar_tasks', JSON.stringify(tasks));
        }

        window.deleteTask = function(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        };

        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="font-weight: bold; color: #666;">No tasks saved yet.</p>';
                return;
            }

            tasks.forEach((task, index) => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task-item';
                taskDiv.innerHTML = `
                    <div style="flex: 1; padding-right: 15px;">
                        <h3 style="margin: 0; text-transform: uppercase;">${task.title}</h3>
                        <p style="margin: 5px 0 0 0; color: #333; font-family: sans-serif;">${task.content}</p>
                    </div>
                    <button class="brutal-btn small" onclick="deleteTask(${index})">Delete</button>
                `;
                taskList.appendChild(taskDiv);
            });
        }

        async function checkConnection() {
            try {
                if (await isAllowed()) {
                    const userInfo = await getUserInfo();
                    if (userInfo && userInfo.publicKey) {
                        const pk = userInfo.publicKey;
                        walletAddressSpan.innerText = pk.slice(0, 6) + '...' + pk.slice(-6);
                        
                        connectBtn.classList.add('hidden');
                        walletInfo.classList.remove('hidden');
                        todoForm.classList.remove('hidden');
                        
                        renderTasks();
                    }
                }
            } catch (error) {
                console.error("Not connected:", error);
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                await setAllowed(); 
                await checkConnection();
            } catch (error) {
                console.error("Connection cancelled:", error);
            }
        });

        disconnectBtn.addEventListener('click', () => {
            walletAddressSpan.innerText = '';
            connectBtn.classList.remove('hidden');
            walletInfo.classList.add('hidden');
            todoForm.classList.add('hidden');
            taskList.innerHTML = '<p style="font-weight: bold; color: #666;">Please connect your wallet to view data.</p>';
        });

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            
            btn.innerText = "Processing...";
            btn.style.backgroundColor = "#ffcc00";
            
            setTimeout(() => {
                tasks.push({
                    title: taskTitle.value,
                    content: taskContent.value
                });

                saveTasks();
                renderTasks();

                taskTitle.value = '';
                taskContent.value = '';
                btn.innerText = "Save to Blockchain";
                btn.style.backgroundColor = "#34c759";
                
            }, 1000);
        });

        checkConnection();
    </script>
</body>
</html>
